<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Protocol — Football Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a0e;--surface:#0d1117;--surface2:#111820;--surface3:#171f28;
  --border:#1a2635;--border2:#223040;
  --accent:#00d4ff;--accent-glow:rgba(0,212,255,0.4);
  --accent2:#39ff14;--accent2-glow:rgba(57,255,20,0.3);
  --accent3:#ff6b35;
  --text:#b0c8de;--text-dim:#4a6070;--text-muted:#2a3a48;--text-bright:#ddeeff;
  --red:#ff3d57;--yellow:#ffb800;--purple:#a855f7;
  --mono:'Space Mono',monospace;--display:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow:hidden}

/* scan lines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,0.008) 3px,rgba(0,212,255,0.008) 4px);pointer-events:none;z-index:9999}

/* ── HEADER ─────────────────────── */
header{
  background:linear-gradient(90deg,#0a1420 0%,#0d1320 100%);
  border-bottom:1px solid var(--border2);
  padding:0 24px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,0.6);
}
.logo{font-family:var(--display);font-weight:900;font-size:20px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);text-shadow:0 0 30px var(--accent-glow);display:flex;align-items:center;gap:12px}
.logo-sep{color:var(--text-muted);font-weight:300;font-size:18px}
.logo-sub{font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:2px;color:var(--text-dim);margin-top:2px}
.header-right{display:flex;align-items:center;gap:24px}
.stat-pill{background:var(--surface2);border:1px solid var(--border2);padding:4px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim);letter-spacing:1px}
.stat-pill strong{color:var(--accent2);font-size:14px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--accent2)}50%{opacity:0.4;box-shadow:none}}

/* ── LAYOUT ──────────────────────── */
.app{display:grid;grid-template-columns:268px 1fr;height:calc(100vh - 52px);overflow:hidden}

/* ── SIDEBAR ─────────────────────── */
.sidebar{
  background:var(--surface);
  border-right:1px solid var(--border2);
  overflow-y:auto;display:flex;flex-direction:column;gap:0;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sb-section{padding:16px;border-bottom:1px solid var(--border)}
.sb-label{
  font-family:var(--display);font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.sb-label-line{flex:1;height:1px;background:var(--border)}

/* position tabs */
.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.pos-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-dim);font-family:var(--display);font-weight:700;
  font-size:11px;letter-spacing:1px;padding:8px 4px;text-align:center;
  cursor:pointer;transition:all .15s;text-transform:uppercase;line-height:1;
}
.pos-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.05)}
.pos-btn.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent);box-shadow:inset 0 0 10px rgba(0,212,255,0.08),0 0 8px rgba(0,212,255,0.15)}

/* range slider */
.range-row{display:flex;justify-content:space-between;font-size:11px;color:var(--accent2);margin-bottom:6px}
.range-track{position:relative;height:4px;background:var(--border2);border-radius:2px;margin:0 0 4px}
.range-fill{position:absolute;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;pointer-events:none}
.slider-wrap{position:relative;height:16px;margin-top:2px}
input[type=range]{position:absolute;width:100%;top:-6px;left:0;-webkit-appearance:none;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 8px var(--accent-glow)}
input[type=range]::-webkit-slider-runnable-track{background:transparent}

/* selects */
.sel-wrap{position:relative;margin-bottom:8px}
.sel-wrap:last-child{margin-bottom:0}
select,input[type=text]{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:11px;
  padding:8px 28px 8px 10px;outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
select:focus,input[type=text]:focus{border-color:var(--accent);background:var(--surface3)}
select option{background:var(--surface2)}
.sel-wrap::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:9px}

/* role card */
.role-card{
  background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(57,255,20,0.03));
  border:1px solid rgba(0,212,255,0.2);padding:12px;margin-top:10px;
  display:none;flex-direction:column;gap:8px;
  box-shadow:inset 0 0 20px rgba(0,212,255,0.04);
}
.role-card.show{display:flex}
.rc-name{font-family:var(--display);font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.5px;line-height:1.2}
.rc-desc{font-size:10px;color:var(--text-dim);line-height:1.6}
.rc-metrics{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.rc-tag{background:rgba(57,255,20,0.08);border:1px solid rgba(57,255,20,0.2);color:var(--accent2);font-size:9px;padding:2px 6px;letter-spacing:.3px;white-space:nowrap}

/* reset */
.reset-btn{
  margin:16px;background:transparent;border:1px solid var(--border2);
  color:var(--text-dim);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  padding:9px;cursor:pointer;transition:all .15s;text-transform:uppercase;width:calc(100% - 32px);
}
.reset-btn:hover{border-color:var(--red);color:var(--red);background:rgba(255,61,87,0.05)}

/* ── MAIN ─────────────────────── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* toolbar */
.toolbar{
  background:var(--surface);border-bottom:1px solid var(--border2);
  padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.result-count{font-family:var(--display);font-size:12px;color:var(--text-dim);letter-spacing:1px;white-space:nowrap}
.result-count strong{color:var(--accent2);font-size:18px;margin-right:3px}
.search-box{position:relative;flex:1;max-width:260px}
.search-box input{padding-left:28px;margin:0}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none}
.sort-hint{font-size:10px;color:var(--text-muted);letter-spacing:.5px;margin-left:auto;white-space:nowrap}

/* metric toggle */
.metric-mode{display:flex;gap:0;margin-left:auto}
.mm-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:1px;padding:5px 10px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.mm-btn:first-child{border-right:none}
.mm-btn.active{background:rgba(57,255,20,0.1);border-color:var(--accent2);color:var(--accent2)}

/* table wrap */
.table-wrap{flex:1;overflow:auto}
.table-wrap::-webkit-scrollbar{height:5px;width:5px}
.table-wrap::-webkit-scrollbar-track{background:var(--surface)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

table{border-collapse:collapse;width:100%;font-size:12px}
thead{position:sticky;top:0;z-index:50}
thead tr{background:var(--surface);border-bottom:2px solid var(--border2)}

th{
  font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-dim);
  padding:10px 12px;text-align:left;white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .15s;
  border-right:1px solid var(--border);position:relative;
}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
th.sorted::after{content:' ↓';font-size:9px}
th.sorted.asc::after{content:' ↑'}
th.metric-h{color:rgba(57,255,20,0.7) !important;border-right:1px solid rgba(57,255,20,0.15) !important}
th.metric-h:hover{color:var(--accent2) !important}
th.metric-h.sorted{color:var(--accent2) !important}

tbody tr{border-bottom:1px solid rgba(26,38,53,0.8);cursor:pointer;transition:background .1s}
tbody tr:nth-child(even){background:rgba(13,17,23,0.4)}
tbody tr:hover{background:rgba(0,212,255,0.04) !important}

td{padding:8px 12px;white-space:nowrap;border-right:1px solid var(--border);vertical-align:middle}

/* base cols */
.c-player{font-weight:700;color:var(--text-bright);min-width:140px;max-width:200px}
.c-age{text-align:center;color:var(--text);min-width:44px}
.c-squad{color:var(--accent);font-size:11px;min-width:120px}
.c-nat{color:var(--text-dim);font-size:10px;letter-spacing:.5px;min-width:40px}
.c-pos{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:1px;color:var(--yellow);min-width:70px}

/* metric cells */
.mc{position:relative;min-width:88px;border-right:1px solid rgba(57,255,20,0.1) !important;overflow:hidden}
.mc-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--accent2);opacity:.45;transition:width .2s}
.mc-val{position:relative;z-index:1;font-size:11px}
.pct-badge{
  display:inline-block;padding:1px 5px;font-size:9px;font-family:var(--display);font-weight:700;letter-spacing:.5px;
  border-radius:0;margin-left:6px;vertical-align:middle;
}

/* percentile classes */
.p-elite{color:#fff;background:rgba(57,255,20,0.85);border:1px solid #39ff14}
.p-top{color:var(--accent2)}
.p-high{color:var(--text-bright)}
.p-mid{color:var(--text)}
.p-low{color:var(--text-dim)}
.p-null{color:var(--text-muted)}

/* empty */
.empty{padding:60px;text-align:center;color:var(--text-dim)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.25}
.empty-txt{font-family:var(--display);font-size:16px;letter-spacing:2px}

/* footer */
.table-footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:6px 20px;display:flex;justify-content:space-between;align-items:center;
  font-size:10px;color:var(--text-muted);letter-spacing:.5px;flex-shrink:0;
}
.footer-right{color:var(--text-dim)}

/* tooltip */
.tt{position:fixed;background:var(--surface2);border:1px solid var(--border2);padding:10px 14px;font-size:11px;pointer-events:none;z-index:999;display:none;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.tt-name{font-family:var(--display);font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px}
.tt-row{display:flex;justify-content:space-between;gap:16px;margin-top:3px;font-size:10px;color:var(--text-dim)}
.tt-row span{color:var(--text)}
</style>
</head>
<body>

<header>
  <div class="logo">
    Scout<div class="logo-sep">//</div>Protocol
  </div>
  <div class="header-right">
    <div class="stat-pill">
      <div class="pulse"></div>
      PREMIER LEAGUE 2025/26 &nbsp;·&nbsp; PER 90 MIN
    </div>
    <div class="stat-pill">
      <strong id="hTotal">—</strong> PLAYERS
    </div>
  </div>
</header>

<div class="app">

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">

  <div class="sb-section">
    <div class="sb-label">Position <div class="sb-label-line"></div></div>
    <div class="pos-grid">
      <button class="pos-btn active" data-pos="ALL">All</button>
      <button class="pos-btn" data-pos="GK">GK</button>
      <button class="pos-btn" data-pos="DF">CB</button>
      <button class="pos-btn" data-pos="WB">WB</button>
      <button class="pos-btn" data-pos="DM">DM</button>
      <button class="pos-btn" data-pos="CM">CM</button>
      <button class="pos-btn" data-pos="WG">WG</button>
      <button class="pos-btn" data-pos="AM">AM</button>
      <button class="pos-btn" data-pos="FW">FW</button>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-label">Age Range <div class="sb-label-line"></div></div>
    <div class="range-row"><span id="lblMin">18</span><span id="lblMax">40</span></div>
    <div class="range-track">
      <div class="range-fill" id="rfill"></div>
    </div>
    <div class="slider-wrap">
      <input type="range" id="sMin" min="18" max="40" value="18">
      <input type="range" id="sMax" min="18" max="40" value="40">
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-label">Club <div class="sb-label-line"></div></div>
    <div class="sel-wrap">
      <select id="fSquad"><option value="">— All Clubs —</option></select>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-label">FM Role <div class="sb-label-line"></div></div>
    <div class="sel-wrap">
      <select id="fRole"><option value="">— Select Role —</option></select>
    </div>

    <div class="role-card" id="roleCard">
      <div class="rc-name" id="rcName"></div>
      <div class="rc-desc" id="rcDesc"></div>
      <div class="rc-metrics" id="rcMetrics"></div>
    </div>
  </div>

  <button class="reset-btn" id="btnReset">⟳ &nbsp;Reset All Filters</button>

</aside>

<!-- ═══ MAIN ═══ -->
<main class="main">

  <div class="toolbar">
    <div class="result-count"><strong id="rCount">—</strong> players</div>
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="fSearch" placeholder="Search player name...">
    </div>
    <div class="metric-mode" id="metricMode" style="display:none">
      <button class="mm-btn active" data-m="value">Value</button>
      <button class="mm-btn" data-m="pct">%ile</button>
    </div>
    <div class="sort-hint">↑↓ click header to sort</div>
  </div>

  <div class="table-wrap" id="tableWrap">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="table-footer">
    <span><span class="pulse" style="display:inline-block;margin-right:6px"></span>FBref data · per 90 minutes · 2025/26 season</span>
    <span class="footer-right" id="footerR">—</span>
  </div>

</main>
</div>

<!-- tooltip -->
<div class="tt" id="tt">
  <div class="tt-name" id="ttName"></div>
  <div id="ttBody"></div>
</div>

<script>
// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
let PLAYERS = [];
let _initDone = false;

// ── CSV loader ──────────────────────────────────────
const CSV_FILE = 'players.csv';

const SKIP_COLS = new Set([
  'Statistic','Shooting','Passing','Pass Types',
  'Goal and Shot Creation','Defense','Possession',
  'Miscellaneous Stats','Advanced Goalkeeping'
]);

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  const useCols = headers.map((h,i) => SKIP_COLS.has(h.trim()) ? -1 : i).filter(i => i >= 0);
  const cleanHeaders = useCols.map(i => headers[i].trim());
  const records = [];
  for (let r = 1; r < lines.length; r++) {
    if (!lines[r].trim()) continue;
    const cells = splitCSVLine(lines[r]);
    const obj = {};
    useCols.forEach((ci, idx) => {
      const h = cleanHeaders[idx];
      const raw = (cells[ci] || '').trim();
      if (raw === '' || raw === 'N/A' || raw === 'null') { obj[h] = null; }
      else {
        const n = parseFloat(raw);
        obj[h] = isNaN(n) ? raw : Math.round(n * 100) / 100;
      }
    });
    records.push(obj);
  }
  return records;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

fetch(CSV_FILE)
  .then(r => {
    if (!r.ok) throw new Error('Could not load ' + CSV_FILE);
    return r.text();
  })
  .then(text => {
    PLAYERS = parseCSV(text);
    document.getElementById('hTotal').textContent = PLAYERS.length;
    initSquads();
    populateRoles();
    updateRange();
    render();
  })
  .catch(err => {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="20"><div class="empty"><div class="empty-icon">⚠️</div>' +
      '<div class="empty-txt">Could not load ' + CSV_FILE + ' — ' + err.message + '</div></div></td></tr>';
  });

// ════════════════════════════════════════════════════
//  ROLES (from role_definitions.R)
// ════════════════════════════════════════════════════
const ROLES = {
  "Goalkeeper (Kaleci)":{metrics:["Save Percentage","PSxG-GA","Clean Sheet Percentage"],desc:"Traditional last line of defense focusing on shot-stopping and collecting crosses.",pos:["GK"]},
  "Sweeper Keeper (Libero Kaleci)":{metrics:["Def. Actions Outside Pen. Area","Avg. Distance of Def. Actions","Passes Attempted","Launch %"],desc:"Hybrid keeper who cleans up balls outside the box and initiates quick counter-attacks.",pos:["GK"]},
  "Central Defender (Standart Stoper)":{metrics:["Aerials Won","Clearances","Blocks","Tackles Won"],desc:"Reliable defender focused on clearing danger and breaking up opposition attacks.",pos:["DF"]},
  "Ball Playing Defender (Pasör Stoper)":{metrics:["Passes Attempted","Progressive Passes","Pass Completion %","Carries"],desc:"Defends traditionally but excels at playing long balls and building from the back.",pos:["DF"]},
  "No-Nonsense CB (Çakılı Stoper)":{metrics:["Clearances","% of Aerials Won","Blocks","Tackles (Def 3rd)"],desc:"Risk-free defender who wins the ball and clears it immediately without hesitation.",pos:["DF"]},
  "Libero":{metrics:["Progressive Carries","Passes Attempted","Interceptions","Successful Take-Ons"],desc:"Defensive sweeper who can step into midfield to provide an extra passing option.",pos:["DF"]},
  "Wide Center Back (Kenar Stoper)":{metrics:["Tackles","Carries into Final Third","Crosses","Interceptions"],desc:"A back-three specialist who stays wide to support the flank and overlap like a fullback.",pos:["DF","WB"]},
  "Full Back (Bek - Standart)":{metrics:["Tackles","Blocks","Passes into Final Third","Touches (Def 3rd)"],desc:"Disciplined wide defender who balances defensive duties with measured attacking support.",pos:["WB","DF"]},
  "Wing Back (Kanat Bek)":{metrics:["Progressive Carries","Crosses","Key Passes","Successful Take-Ons"],desc:"Attacking flank player who stays wide to provide crosses and constant offensive width.",pos:["WB"]},
  "No-Nonsense Full Back (Çakılı Bek)":{metrics:["Clearances","Tackles Won","Aerials Won","Blocks"],desc:"Strictly defensive wide player focused on winning the ball and staying deep.",pos:["WB","DF"]},
  "Complete Wing Back (İki Yönlü Bek)":{metrics:["Touches (Att Pen)","Shot-Creating Actions","Tackles","Successful Take-Ons"],desc:"High-energy wide player who naturally dominates the entire flank from box to box.",pos:["WB"]},
  "Inverted Wing Back (Sahte Bek)":{metrics:["Passes Attempted","Pass Completion %","Touches (Mid 3rd)","Progressive Passes"],desc:"Lines up wide but tucks into central midfield to act as an extra playmaker.",pos:["WB","DF"]},
  "Inverted Full Back (Stoperleşen Bek)":{metrics:["Aerials Won","Clearances","Pass Completion %","Interceptions"],desc:"Stays deep during attacks to tuck in and form a solid back-three structure.",pos:["WB","DF"]},
  "Defensive Midfielder (Standart DOS)":{metrics:["Tackles Won","Interceptions","Pass Completion %","Blocks"],desc:"Protects the back four by screening the defense and dictating the tempo.",pos:["DM"]},
  "Deep Lying Playmaker (Defansif Oyun Kurucu)":{metrics:["Passes Attempted","Progressive Passes","Switches","Passes Completed (Long)"],desc:"Creative engine operating deep, launching attacks with precision long-range passing.",pos:["DM","CM"]},
  "Ball Winning Midfielder (Savaşçı Orta Saha)":{metrics:["Tackles Won","Tackles (Att 3rd)","Ball Recoveries","Yellow Cards"],desc:"Aggressive ball-hunter who closes down opponents to win possession and recycle play.",pos:["DM","CM"]},
  "Anchor Man (Ön Libero)":{metrics:["Interceptions","Clearances","Aerials Won","Pass Completion %"],desc:"Disciplined defensive shield who stays in position to intercept moves and protect the lines.",pos:["DM"]},
  "Half Back (Gizli Libero)":{metrics:["Passes Attempted","Tackles (Def 3rd)","Aerials Won"],desc:"Hybrid DM who drops between center-backs to help recycle possession and offer security.",pos:["DM"]},
  "Regista":{metrics:["Shot-Creating Actions","Progressive Passes","Key Passes","Through Balls"],desc:"Creative maestro with complete freedom to orchestrate the game from deep positions.",pos:["DM","CM"]},
  "Segundo Volante (Serbest DOS)":{metrics:["Shots Total","Carries into Final Third","Tackles","Average Shot Distance"],desc:"Dynamic DM who surges forward from deep to provide a goal threat and late runs.",pos:["DM","CM"]},
  "Central Midfielder (Standart Orta Saha)":{metrics:["Pass Completion %","Tackles","Assists","Progressive Passes Rec"],desc:"Versatile all-rounder who links defense and attack based on team requirements.",pos:["CM"]},

// ════════════════════════════════════════════════════
//  POSITION MAPPING (exact FBref values)
// ════════════════════════════════════════════════════
const POS_MAP = {
  GK:  p => p === 'GK',
  DF:  p => p === 'DF' || p === 'DF,FW' || p === 'FW,DF',
  WB:  p => p === 'DF,MF' || p === 'MF,DF',
  DM:  p => p === 'MF' || p === 'DF,MF' || p === 'MF,DF',
  CM:  p => p === 'MF' || p === 'MF,FW' || p === 'FW,MF',
  WG:  p => p === 'MF,FW' || p === 'FW,MF',
  AM:  p => p === 'MF,FW' || p === 'FW,MF',
  FW:  p => p === 'FW' || p === 'FW,MF' || p === 'MF,FW' || p === 'DF,FW' || p === 'FW,DF',
};

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let S = {
  pos:'ALL', ageMin:18, ageMax:40, squad:'', role:'', search:'',
  sortKey:null, sortDir:'desc', metricMode:'value'
};

// ════════════════════════════════════════════════════
//  FILTER
// ════════════════════════════════════════════════════
function filtered(){
  return PLAYERS.filter(p=>{
    if(S.pos !== 'ALL' && !POS_MAP[S.pos](p.Position)) return false;
    if(p.Age < S.ageMin || p.Age > S.ageMax) return false;
    if(S.squad && p.Squad !== S.squad) return false;
    if(S.search && !p.Player.toLowerCase().includes(S.search)) return false;
    return true;
  });
}

// ════════════════════════════════════════════════════
//  PERCENTILE
// ════════════════════════════════════════════════════
function buildPct(players, metrics){
  const out={};
  metrics.forEach(m=>{
    const vals=players.map(p=>p[m]).filter(v=>v!=null).sort((a,b)=>a-b);
    out[m]={min:vals[0]??0, max:vals[vals.length-1]??0};
  });
  return out;
}
function getPct(val, p){
  if(!p || val==null) return 0;
  if(p.max===p.min) return 50;
  return Math.round(((val-p.min)/(p.max-p.min))*100);
}
function pctClass(pct){
  if(pct>=90) return 'p-elite';
  if(pct>=75) return 'p-top';
  if(pct>=50) return 'p-high';
  if(pct>=25) return 'p-mid';
  return 'p-low';
}

// ════════════════════════════════════════════════════
//  SORT
// ════════════════════════════════════════════════════
function sorted(arr){
  if(!S.sortKey) return arr;
  return [...arr].sort((a,b)=>{
    let va=a[S.sortKey], vb=b[S.sortKey];
    if(va==null) va=S.sortDir==='desc'?-Infinity:Infinity;
    if(vb==null) vb=S.sortDir==='desc'?-Infinity:Infinity;
    if(typeof va==='string') return S.sortDir==='desc'?(va<vb?1:-1):(va>vb?1:-1);
    return S.sortDir==='desc'?vb-va:va-vb;
  });
}

// ════════════════════════════════════════════════════
//  COLUMNS
// ════════════════════════════════════════════════════
const BASE = [
  {key:'Player',label:'Player',td:'c-player'},
  {key:'Age',label:'Age',td:'c-age'},
  {key:'Squad',label:'Club',td:'c-squad'},
  {key:'Nation',label:'Nat.',td:'c-nat'},
  {key:'Position',label:'Pos.',td:'c-pos'},
];
function getCols(){
  const cols=[...BASE];
  const role=ROLES[S.role];
  if(role) role.metrics.forEach(m=>cols.push({key:m,label:m,metric:true}));
  return cols;
}

// ════════════════════════════════════════════════════
//  RENDER HEADERS
// ════════════════════════════════════════════════════
function renderHeaders(cols){
  const row=document.getElementById('thead');
  row.innerHTML='';
  cols.forEach(c=>{
    const th=document.createElement('th');
    th.textContent=c.label;
    if(c.metric) th.classList.add('metric-h');
    if(S.sortKey===c.key){th.classList.add('sorted');if(S.sortDir==='asc')th.classList.add('asc');}
    th.addEventListener('click',()=>{
      S.sortKey===c.key ? S.sortDir=(S.sortDir==='desc'?'asc':'desc') : (S.sortKey=c.key, S.sortDir='desc');
      render();
    });
    row.appendChild(th);
  });
}

// ════════════════════════════════════════════════════
//  RENDER TABLE
// ════════════════════════════════════════════════════
function render(){
  const cols=getCols();
  renderHeaders(cols);

  let players=filtered();
  players=sorted(players);

  document.getElementById('rCount').textContent=players.length;
  document.getElementById('hTotal').textContent=PLAYERS.length;
  document.getElementById('footerR').textContent=`Showing ${players.length} of ${PLAYERS.length} players`;

  const metricCols=cols.filter(c=>c.metric);
  document.getElementById('metricMode').style.display=metricCols.length?'flex':'none';

  // build percentiles against current filtered set
  const pct={};
  metricCols.forEach(c=>{
    const vals=players.map(p=>p[c.key]).filter(v=>v!=null).sort((a,b)=>a-b);
    pct[c.key]={min:vals[0]??0,max:vals[vals.length-1]??0};
  });

  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  if(!players.length){
    tbody.innerHTML='<tr><td colspan="20"><div class="empty"><div class="empty-icon">⚽</div><div class="empty-txt">No players match your filters</div></div></td></tr>';
    return;
  }

  const frag=document.createDocumentFragment();
  players.forEach(p=>{
    const tr=document.createElement('tr');
    cols.forEach(c=>{
      const td=document.createElement('td');
      const v=p[c.key];
      if(c.metric){
        td.className='mc';
        const pc=getPct(v,pct[c.key]);
        const bar=document.createElement('div');
        bar.className='mc-bar';
        bar.style.width=pc+'%';
        const span=document.createElement('span');
        span.className='mc-val '+(v==null?'p-null':pctClass(pc));
        span.textContent=v==null?'—':(typeof v==='number'?v.toFixed(2):v);
        if(S.metricMode==='pct' && v!=null){
          const badge=document.createElement('span');
          badge.className='pct-badge '+pctClass(pc);
          badge.textContent=pc;
          span.appendChild(badge);
        }
        td.appendChild(bar);
        td.appendChild(span);
      } else {
        if(c.td) td.className=c.td;
        td.textContent=v==null?'—':v;
      }
      tr.appendChild(td);
    });

    // tooltip on hover
    tr.addEventListener('mouseenter',e=>showTooltip(e,p,metricCols,pct));
    tr.addEventListener('mouseleave',hideTooltip);
    tr.addEventListener('mousemove',moveTooltip);
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
}

// ════════════════════════════════════════════════════
//  TOOLTIP
// ════════════════════════════════════════════════════
const tt=document.getElementById('tt');
function showTooltip(e,p,metricCols,pct){
  if(!metricCols.length) return;
  document.getElementById('ttName').textContent=p.Player;
  const body=document.getElementById('ttBody');
  body.innerHTML='';
  metricCols.forEach(c=>{
    const v=p[c.key];
    const pc=getPct(v,pct[c.key]);
    const row=document.createElement('div');
    row.className='tt-row';
    row.innerHTML=`<span style="color:var(--text-dim)">${c.label}</span><span style="color:${pc>=75?'var(--accent2)':pc>=50?'var(--text-bright)':'var(--text)'}">${v==null?'—':(typeof v==='number'?v.toFixed(2):v)} <span style="font-size:9px;color:var(--text-dim)">(${pc}%)</span></span>`;
    body.appendChild(row);
  });
  tt.style.display='block';
  moveTooltip(e);
}
function hideTooltip(){tt.style.display='none'}
function moveTooltip(e){
  const x=Math.min(e.clientX+16, window.innerWidth-300);
  const y=Math.min(e.clientY+16, window.innerHeight-200);
  tt.style.left=x+'px';tt.style.top=y+'px';
}

// ════════════════════════════════════════════════════
//  ROLE CARD + DROPDOWN
// ════════════════════════════════════════════════════
function populateRoles(){
  const sel=document.getElementById('fRole');
  const cur=sel.value;
  sel.innerHTML='<option value="">— Select Role —</option>';
  const groups={
    '─── Goalkeepers ───':['GK'],
    '─── Defenders ───':['DF','WB'],
    '─── Midfielders ───':['DM','CM'],
    '─── Wide/Attack ───':['WG','AM'],
    '─── Forwards ───':['FW']
  };
  // Build flat list filtered by position
  const shown=new Set();
  Object.entries(ROLES).forEach(([name,role])=>{
    const show=S.pos==='ALL'||role.pos.includes(S.pos)||
      (S.pos==='DM'&&(role.pos.includes('DM')||role.pos.includes('CM')))||
      (S.pos==='CM'&&(role.pos.includes('CM')||role.pos.includes('DM')))||
      (S.pos==='WG'&&(role.pos.includes('WG')||role.pos.includes('AM')))||
      (S.pos==='AM'&&(role.pos.includes('AM')||role.pos.includes('WG')));
    if(show) shown.add(name);
  });
  // Group display
  let lastGroup='';
  Object.entries(ROLES).forEach(([name])=>{
    if(!shown.has(name)) return;
    // find group
    const role=ROLES[name];
    let grp='Other';
    if(role.pos.includes('GK')) grp='Goalkeepers';
    else if(role.pos.some(p=>['DF','WB'].includes(p)) && !role.pos.some(p=>['DM','CM','WG','AM','FW'].includes(p))) grp='Defenders';
    else if(role.pos.some(p=>['DF','WB'].includes(p))) grp='Defenders';
    else if(role.pos.some(p=>['DM','CM'].includes(p)) && !role.pos.some(p=>['FW','WG','AM'].includes(p))) grp='Midfielders';
    else if(role.pos.some(p=>['WG','AM'].includes(p))) grp='Wide/Attack';
    else if(role.pos.includes('FW')) grp='Forwards';

    if(grp!==lastGroup){
      const og=document.createElement('optgroup');
      og.label='── '+grp+' ──';
      sel.appendChild(og);
      lastGroup=grp;
    }
    const opt=document.createElement('option');
    opt.value=name;opt.textContent=name;
    sel.appendChild(opt);
  });
  // restore
  const still=[...sel.options].some(o=>o.value===cur);
  if(still){sel.value=cur;}
  else{sel.value='';S.role='';updateRoleCard();}
}

function updateRoleCard(){
  const card=document.getElementById('roleCard');
  const role=ROLES[S.role];
  if(!role){card.classList.remove('show');return;}
  card.classList.add('show');
  document.getElementById('rcName').textContent=S.role;
  document.getElementById('rcDesc').textContent=role.desc;
  document.getElementById('rcMetrics').innerHTML=role.metrics.map(m=>`<span class="rc-tag">${m}</span>`).join('');
}

// ════════════════════════════════════════════════════
//  RANGE SLIDER
// ════════════════════════════════════════════════════
function updateRange(){
  const mn=parseInt(document.getElementById('sMin').value);
  const mx=parseInt(document.getElementById('sMax').value);
  const lp=((mn-18)/22)*100, wp=((mx-mn)/22)*100;
  document.getElementById('rfill').style.left=lp+'%';
  document.getElementById('rfill').style.width=wp+'%';
  document.getElementById('lblMin').textContent=mn;
  document.getElementById('lblMax').textContent=mx;
}

// ════════════════════════════════════════════════════
//  INIT DROPDOWNS
// ════════════════════════════════════════════════════
function initSquads(){
  const squads=[...new Set(PLAYERS.map(p=>p.Squad))].sort();
  const sel=document.getElementById('fSquad');
  squads.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}

// ════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════
document.querySelectorAll('.pos-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.pos=btn.dataset.pos;
    populateRoles();
    render();
  });
});

['sMin','sMax'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    let mn=parseInt(document.getElementById('sMin').value);
    let mx=parseInt(document.getElementById('sMax').value);
    if(mn>mx){if(id==='sMin') document.getElementById('sMin').value=mx; else document.getElementById('sMax').value=mn;}
    mn=parseInt(document.getElementById('sMin').value);
    mx=parseInt(document.getElementById('sMax').value);
    S.ageMin=mn; S.ageMax=mx;
    updateRange(); render();
  });
});

document.getElementById('fSquad').addEventListener('change',e=>{S.squad=e.target.value;render();});
document.getElementById('fRole').addEventListener('change',e=>{
  S.role=e.target.value;
  updateRoleCard();
  if(S.role&&ROLES[S.role]){S.sortKey=ROLES[S.role].metrics[0];S.sortDir='desc';}
  render();
});
document.getElementById('fSearch').addEventListener('input',e=>{S.search=e.target.value.trim().toLowerCase();render();});

document.querySelectorAll('.mm-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mm-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.metricMode=btn.dataset.m;
    render();
  });
});

document.getElementById('btnReset').addEventListener('click',()=>{
  S={pos:'ALL',ageMin:18,ageMax:40,squad:'',role:'',search:'',sortKey:null,sortDir:'desc',metricMode:'value'};
  document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.pos-btn[data-pos="ALL"]').classList.add('active');
  document.getElementById('sMin').value=18;
  document.getElementById('sMax').value=40;
  document.getElementById('fSquad').value='';
  document.getElementById('fSearch').value='';
  document.querySelectorAll('.mm-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.mm-btn[data-m="value"]').classList.add('active');
  updateRange();
  updateRoleCard();
  populateRoles();
  render();
});

// Boot is handled by fetch() above
</script>
